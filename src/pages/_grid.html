<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .grid {
        display: grid;
        /* Плавное изменение числа колонок: колонки сужаются до 260px, затем переносятся */
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
        gap: clamp(16px, 3vw, 30px);
      }
      .grid-item {
        min-height: 100px;
      }
      .grid-item-1 {
        padding: 10px;
        grid-column: span 2;
      }
      .grid-item-2 {
        background-color: blue;
        padding: 10px;
      }
      .grid-item-3 {
        background-color: green;
        padding: 10px;
      }
      .grid-item-4 {
        background-color: yellow;
        padding: 10px;
      }
      .grid-item-5 {
        background-color: purple;
        padding: 10px;
      }
      .grid-item-6 {
        background-color: orange;
        padding: 10px;
        grid-column: span 2;
      }
      .grid-item-7 {
        background-color: pink;
        padding: 10px;
        grid-column: span 4;
      }
      .grid-item-8 {
        background-color: brown;
        padding: 10px;
      }
      h3 {
        margin: 0px 0px 20px 0;
        font-size: 36px;
        font-weight: 700;
        line-height: 1.2;
        color: rgb(0, 0, 0);
        font-family: Raleway;
      }
      p {
        margin: 0px 0px 20px 0;
        font-size: 16px;
        font-weight: 400;
        color: rgb(0, 0, 0);
      }
      button {
        margin: 0;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        background-color: rgb(0, 0, 0);
        color: rgb(255, 0, 0);
      }
      /* Ниже ~780px: 2 колонки — широкий блок на всю строку */
      @media (max-width: 780px) {
        .grid-item-7 {
          grid-column: span 2;
        }
      }
      /* Ниже ~540px: 1 колонка — все блоки на всю ширину */
      @media (max-width: 540px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .grid-item-1,
        .grid-item-6,
        .grid-item-7 {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="grid-item-1 grid-item">
        <h3>Курс, который работает и вот почему</h3>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam,
          quos.
        </p>
        <button>Button</button>
      </div>
      <div class="grid-item-2 grid-item">2</div>
      <div class="grid-item-3 grid-item">3</div>
      <div class="grid-item-4 grid-item">4</div>
      <div class="grid-item-5 grid-item">5</div>
      <div class="grid-item-6 grid-item">6</div>
      <div class="grid-item-7 grid-item">7</div>
    </div>
  </body>
</html>
