name: Deploy Astro to Timeweb (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate lead DB config
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          YANDEX_CAPTCHA_SECRET: ${{ secrets.YANDEX_CAPTCHA_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os
          pw = os.environ['DB_PASSWORD'].replace("'", "\\'")
          cs = os.environ['YANDEX_CAPTCHA_SECRET'].replace("'", "\\'")
          config = f"""<?php\n\nreturn [\n    'db' => [\n        'host' => 'localhost',\n        'port' => 3306,\n        'database' => 'cy90253_egehim',\n        'username' => 'cy90253_egehim',\n        'password' => '{pw}',\n        'charset' => 'utf8mb4',\n    ],\n    'captcha' => [\n        'secret' => '{cs}',\n    ],\n];\n"""
          with open('public/api/lead.config.php', 'w') as f:
              f.write(config)
          PYEOF

      - name: Build
        run: npm run build

      - name: FTP Deploy dist/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
